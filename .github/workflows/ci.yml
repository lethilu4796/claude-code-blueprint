name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hook-tests:
    name: Hook Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hook tests
        run: bash hooks/test-hooks.sh

  link-check:
    name: Link Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            --exclude 'https://console.anthropic.com'
            --exclude 'https://github.com/YOUR-USERNAME'
            --exclude 'github.com/faizkhairi/claude-code-blueprint/discussions'
            --accept 200,204,301,302,403,429
            '**/*.md'
          fail: false

      - name: Report results
        if: always()
        run: |
          if [ -f lychee/out.md ]; then
            echo "## Link Check Results" >> $GITHUB_STEP_SUMMARY
            cat lychee/out.md >> $GITHUB_STEP_SUMMARY
          fi

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
          config: |
            {
              "default": false,
              "MD001": true,
              "MD009": true,
              "MD012": true,
              "MD037": true,
              "MD047": true
            }
